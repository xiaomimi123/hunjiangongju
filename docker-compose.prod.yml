name: dongfangwenlan

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # 一次性任务：应用数据库迁移 + 初始化管理员/标签树；成功后 web/worker 才启动
  migrate:
    build: { context: ., dockerfile: worker/Dockerfile }
    env_file: [.env.prod]
    restart: "no"
    command: >
      sh -lc "npx prisma migrate deploy --schema packages/db/prisma/schema.prisma
      && npm run bootstrap -w worker
      && if [ \"$${SEED_DEMO}\" = \"1\" ]; then npm run seed -w worker; fi"
    volumes:
      - ./data:/data
    depends_on:
      postgres: { condition: service_healthy }

  web:
    build: { context: ., dockerfile: web/Dockerfile }
    restart: unless-stopped
    env_file: [.env.prod]
    expose: ["3000"]
    volumes:
      - ./data:/data
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }

  worker:
    build: { context: ., dockerfile: worker/Dockerfile }
    restart: unless-stopped
    env_file: [.env.prod]
    volumes:
      - ./data:/data
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: [.env.prod]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
